name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint commits
        run: bunx commitlint --from origin/main --to HEAD --verbose

      - run: bun run typecheck

      - run: bun test

      - run: bun run build
